basePath: /api
definitions:
  dto.CancelRequestDTO:
    properties:
      comment:
        type: string
      reason:
        enum:
        - not_relevant
        - wrong_data
        - mistake
        - other
        type: string
    required:
    - reason
    type: object
  dto.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  dto.RegisterRequest:
    properties:
      company_name:
        type: string
      company_phone:
        type: string
      email:
        type: string
      full_name:
        type: string
      password:
        minLength: 6
        type: string
      phone:
        type: string
      responsible_person:
        type: string
      role:
        enum:
        - monitor
        - contractor
        - admin
        type: string
    required:
    - email
    - full_name
    - password
    - role
    type: object
host: localhost:8080
info:
  contact: {}
  description: REST API for City Service — city request management platform
  title: City Service API
  version: "1.0"
paths:
  /admin/requests:
    get:
      description: Admin gets all requests with full filters
      parameters:
      - description: Filter by status
        in: query
        name: status
        type: string
      - description: Filter by category
        in: query
        name: category_id
        type: integer
      - description: Filter by urgency
        in: query
        name: urgency
        type: string
      - description: Filter by contractor UUID
        in: query
        name: contractor_id
        type: string
      - description: Filter from date YYYY-MM-DD
        in: query
        name: date_from
        type: string
      - description: Filter to date YYYY-MM-DD
        in: query
        name: date_to
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List all requests (admin)
      tags:
      - admin
  /admin/stats:
    get:
      description: Returns counts by status, category and urgency
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get statistics (admin)
      tags:
      - admin
  /auth/login:
    post:
      consumes:
      - application/json
      description: Login with email and password, returns JWT token
      parameters:
      - description: Login credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      summary: Login
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Register as monitor, contractor or admin
      parameters:
      - description: Registration data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      summary: Register new user
      tags:
      - auth
  /categories:
    get:
      description: Get all request categories
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: List categories
      tags:
      - categories
  /contractor/requests:
    get:
      description: Contractor sees all requests with status=new
      parameters:
      - description: Filter by category ID
        in: query
        name: category_id
        type: integer
      - description: 'Filter by urgency: low, medium, critical'
        in: query
        name: urgency
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List available requests
      tags:
      - contractor
  /contractor/requests/{id}:
    get:
      description: Contractor views full request details including monitor contact
      parameters:
      - description: Request UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get request details
      tags:
      - contractor
  /contractor/requests/{id}/complete:
    post:
      consumes:
      - multipart/form-data
      description: 'Contractor closes request with completion data and photo. Status
        changes: in_progress → done'
      parameters:
      - description: Request UUID
        in: path
        name: id
        required: true
        type: string
      - description: Number of days spent
        in: formData
        name: days_spent
        required: true
        type: integer
      - description: Comment about monitor's work
        in: formData
        name: comment
        type: string
      - description: Photo of completed work
        in: formData
        name: photo
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Complete request
      tags:
      - contractor
  /contractor/requests/{id}/take:
    post:
      description: 'Contractor takes a request. Status changes: new → in_progress'
      parameters:
      - description: Request UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Take request
      tags:
      - contractor
  /contractor/requests/my:
    get:
      description: Contractor sees requests assigned to them
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: My active requests
      tags:
      - contractor
  /requests:
    get:
      description: Get all requests with optional filters. Available to monitors.
      parameters:
      - description: 'Filter by status: new, in_progress, done, cancelled'
        in: query
        name: status
        type: string
      - description: Filter by category ID
        in: query
        name: category_id
        type: integer
      - description: 'Filter by urgency: low, medium, critical'
        in: query
        name: urgency
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List all requests
      tags:
      - monitor
    post:
      consumes:
      - multipart/form-data
      description: Monitor creates a new city request with optional photo
      parameters:
      - description: Request title
        in: formData
        name: title
        required: true
        type: string
      - description: Category ID (1-5)
        in: formData
        name: category_id
        required: true
        type: integer
      - description: Problem description
        in: formData
        name: description
        required: true
        type: string
      - description: 'Urgency: low | medium | critical'
        in: formData
        name: urgency
        required: true
        type: string
      - description: Deadline in format YYYY-MM-DD
        in: formData
        name: deadline
        type: string
      - description: Address / location text
        in: formData
        name: location
        required: true
        type: string
      - description: Photo of the problem
        in: formData
        name: photo
        type: file
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Create request
      tags:
      - monitor
  /requests/{id}:
    get:
      description: Get full details of a request
      parameters:
      - description: Request UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get request by ID
      tags:
      - monitor
  /requests/{id}/cancel:
    post:
      consumes:
      - application/json
      description: Monitor cancels own request with a reason
      parameters:
      - description: Request UUID
        in: path
        name: id
        required: true
        type: string
      - description: Cancel reason
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.CancelRequestDTO'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Cancel request
      tags:
      - monitor
  /requests/my:
    get:
      description: Get current monitor's own requests
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: My requests
      tags:
      - monitor
securityDefinitions:
  BearerAuth:
    description: 'Paste your JWT token like: Bearer eyJhbG...'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
